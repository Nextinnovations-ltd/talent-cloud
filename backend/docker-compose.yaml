services:
  tc-postgresdb:
    image: postgres:14-alpine
    volumes:
      - ./pg_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=talentcloud
      - POSTGRES_USER=talentclouduser
      - POSTGRES_PASSWORD=default
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hidden -d db1_1"]
      start_period: 10s
      interval: 30s
      timeout: 3s
      retries: 5

  tc-redis:
    image: redis:alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  default:
    driver: bridge
    name: tc-network
